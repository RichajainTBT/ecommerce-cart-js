<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="style.css" rel="stylesheet">
<body>
    <!-- header -->
    <nav class="navbar navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <h2>LOGO</h2>
            </a>
            <a class="btn btn-primary" href="addtocard.html">Cart List <span class="count totalItem">5</span></a>
        </div>
    </nav>
    <!-- header -->
    <div id="toast-container">
        <div class="toast align-items-center text-white position-fixed top-0 end-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    Hello, world! This is a toast message.
                </div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>
    <section class="pt-5 pb-5">
        <div class="container">
            <div class="row">
                <div class="col-md-8">
                    <div class="table-responsive">
                        <table class="table table-bordered">
                            <thead>
                                <tr>
                                    <th>Sr. No.</th>
                                    <th>Product</th>
                                    <th>Quantity</th>
                                    <th>Price</th>
                                    <th>Total Price</th>
                                    <td>Action</td>
                                </tr>
                            </thead>
                            <tbody id="cartRecord">
                                <tr>
                                    <td>1</td>
                                    <td>
                                        <div class="cart-product-details">
                                            <div class="cart-img-sec">
                                                <img src="https://placehold.co/600x400">
                                            </div>
                                            <div class="card-details">
                                                <h6>Product Name</h6>
                                                <p>Category Name</p>
                                            </div>
                                        </div>
                                    </td>
                                    <td>
                                        <div class="d-flex gap-2">
                                            <button class="btn btn-sm btn-danger decrementCount">-</button>
                                            <input class="form-control cart-quantity form-control-sm" value="1" style="width:100px">
                                            <button class="btn btn-sm btn-success incrementCount">+</button>
                                        </div>
                                    </td>
                                    <td>$400</td>
                                    <td><button class="btn btn-danger btn-sm">Delete</button></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card mb-3">
                        <div class="card-header">
                            <h4>Summary</h4>
                        </div>
                        <div class="card-body">
                            <p>Items : <span class="right-align totalItem">3</span></p>
                            <p>Total Price : <span class="right-align" id="cartTotal">$400</span></p>
                            <button class="btn btn-primary w-100">Proceed to Checkout</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="main.js"></script>
</body>

</html>
